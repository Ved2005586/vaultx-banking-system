spring:
  application:
    name: secure-banking-system

  datasource:
    url: jdbc:h2:file:./bankdata;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: SA
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:SecureBankingSystemSuperSecretKey256BitMinimumLengthForHMACSHA256}
    expiration-ms: 900000
    refresh-expiration-ms: 604800000

  encryption:
    aes-key: ${AES_KEY:1234567890123456}
    rsa-key-size: 2048

  fraud:
    max-daily-transfer: 100000.00
    suspicious-amount-threshold: 10000.00
    max-failed-login-attempts: 5
    lockout-duration-minutes: 30

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

logging:
  level:
    com.securebank: DEBUG
    org.springframework.security: INFO